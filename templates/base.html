<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page_title }}</title>
<meta name="description" content="{{ page_description }}">
<link rel="canonical" href="{{ site_url }}{{ canonical_path }}">
<link rel="alternate" type="application/rss+xml" title="{{ site_name }}" href="/feed.xml">
<meta property="og:type" content="{{ og_type }}">
<meta property="og:title" content="{{ page_title }}">
<meta property="og:description" content="{{ page_description }}">
<meta property="og:site_name" content="{{ site_name }}">
<meta property="og:url" content="{{ site_url }}{{ canonical_path }}">
<meta name="twitter:card" content="summary">
<style>
:root{
  --bg:#fcfcfa; --surface:#ffffff; --ink:#16161a; --muted:#63636b;
  --line:#e7e7e1; --accent:#1f5c4d; --accent-soft:#eaf2ef; --accent-ink:#143f34;
  --code-bg:#f2f2ec; --pre-bg:#16161a; --pre-ink:#f4f4f0; --shadow:rgba(20,20,26,.05);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#101012; --surface:#17171a; --ink:#ececef; --muted:#9a9aa3;
    --line:#26262b; --accent:#6fc7b1; --accent-soft:#16241f; --accent-ink:#9bdcc9;
    --code-bg:#1c1c20; --pre-bg:#0c0c0e; --pre-ink:#e8e8e4; --shadow:rgba(0,0,0,.35);
  }
}
html[data-theme="light"]{
  --bg:#fcfcfa; --surface:#ffffff; --ink:#16161a; --muted:#63636b;
  --line:#e7e7e1; --accent:#1f5c4d; --accent-soft:#eaf2ef; --accent-ink:#143f34;
  --code-bg:#f2f2ec; --pre-bg:#16161a; --pre-ink:#f4f4f0; --shadow:rgba(20,20,26,.05);
}
html[data-theme="dark"]{
  --bg:#101012; --surface:#17171a; --ink:#ececef; --muted:#9a9aa3;
  --line:#26262b; --accent:#6fc7b1; --accent-soft:#16241f; --accent-ink:#9bdcc9;
  --code-bg:#1c1c20; --pre-bg:#0c0c0e; --pre-ink:#e8e8e4; --shadow:rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  line-height:1.65; font-size:17px; -webkit-font-smoothing:antialiased;
  transition:background .2s ease, color .2s ease;
}
.wrap{max-width:720px; margin:0 auto; padding:0 24px}
a{color:var(--accent)}

/* Header */
header.site{position:sticky; top:0; z-index:20; background:color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter:saturate(180%) blur(10px); border-bottom:1px solid var(--line)}
header.site .wrap{display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 24px; max-width:720px; margin:0 auto}
.brand{font-weight:700; font-size:18px; letter-spacing:-0.02em; color:var(--ink); text-decoration:none; white-space:nowrap}
.brand span{color:var(--accent)}
.nav{display:flex; align-items:center; gap:4px}
.nav a{color:var(--muted); text-decoration:none; font-size:14px; padding:6px 10px; border-radius:6px; transition:color .15s, background .15s}
.nav a:hover{color:var(--ink); background:var(--accent-soft)}
.nav a.active{color:var(--accent-ink); background:var(--accent-soft)}
.theme-toggle{background:none; border:1px solid var(--line); color:var(--muted); width:34px; height:34px; border-radius:8px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; margin-left:6px; transition:color .15s, border-color .15s}
.theme-toggle:hover{color:var(--ink); border-color:var(--accent)}
.theme-toggle svg{width:17px; height:17px}

main{padding:48px 0 72px; min-height:60vh}
.eyebrow{font-family:"SFMono-Regular",ui-monospace,Menlo,monospace; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--accent); margin-bottom:12px}

/* Hero */
.hero{padding:8px 0 40px; border-bottom:1px solid var(--line); margin-bottom:40px}
.hero h1{font-size:40px; line-height:1.1; letter-spacing:-0.03em; margin-bottom:14px}
.hero .lede{color:var(--muted); font-size:19px; max-width:42ch}

h1.page{font-size:32px; line-height:1.15; letter-spacing:-0.025em; margin-bottom:8px}
.lede{color:var(--muted); font-size:18px; margin-bottom:36px}

/* Post list */
.post-list{list-style:none}
.post-item{padding:26px 0; border-bottom:1px solid var(--line)}
.post-item:last-child{border-bottom:none}
.post-item .date{font-family:"SFMono-Regular",ui-monospace,Menlo,monospace; font-size:12px; color:var(--muted); letter-spacing:0.04em}
.post-item h2{font-size:22px; line-height:1.3; letter-spacing:-0.015em; margin:7px 0 7px}
.post-item h2 a{color:var(--ink); text-decoration:none}
.post-item h2 a:hover{color:var(--accent)}
.post-item p{color:var(--muted); font-size:15.5px}
.tag{display:inline-block; font-family:ui-monospace,Menlo,monospace; font-size:11px; color:var(--accent-ink); background:var(--accent-soft); padding:3px 9px; border-radius:5px; margin-top:12px; text-decoration:none}
a.tag:hover{filter:brightness(.97)}

/* Topics grid */
.topic-grid{list-style:none; display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; margin-top:8px}
.topic-card{border:1px solid var(--line); border-radius:10px; padding:18px; background:var(--surface); transition:border-color .15s, transform .15s; box-shadow:0 1px 2px var(--shadow)}
.topic-card:hover{border-color:var(--accent); transform:translateY(-1px)}
.topic-card a{text-decoration:none; color:var(--ink); font-weight:600; font-size:16px}
.topic-card .count{display:block; color:var(--muted); font-size:13px; margin-top:4px}

/* Article */
article.post .meta{font-family:"SFMono-Regular",ui-monospace,Menlo,monospace; font-size:12.5px; color:var(--muted); margin-bottom:14px; letter-spacing:0.03em}
article.post h1{font-size:34px; line-height:1.15; letter-spacing:-0.025em; margin-bottom:22px}
article.post h2{font-size:23px; margin:36px 0 12px; letter-spacing:-0.015em}
article.post h3{font-size:18px; margin:28px 0 10px}
article.post p{margin:0 0 20px}
article.post a{text-decoration:underline; text-underline-offset:2px}
article.post ul,article.post ol{margin:0 0 20px 22px}
article.post li{margin-bottom:8px}
article.post blockquote{border-left:3px solid var(--accent); padding-left:18px; color:var(--muted); margin:0 0 20px; font-style:italic}
article.post code{font-family:ui-monospace,Menlo,monospace; font-size:0.9em; background:var(--code-bg); padding:1px 5px; border-radius:4px}
article.post pre{background:var(--pre-bg); color:var(--pre-ink); padding:18px; border-radius:8px; overflow-x:auto; margin:0 0 20px}
article.post pre code{background:none; color:inherit; padding:0}
article.post hr{border:none; border-top:1px solid var(--line); margin:36px 0}
.post-footer{margin-top:44px; padding-top:24px; border-top:1px solid var(--line); color:var(--muted); font-size:14px}

.back{display:inline-block; margin-bottom:28px; color:var(--muted); text-decoration:none; font-size:14px}
.back:hover{color:var(--accent)}

/* Prose pages (About) */
.prose h2{font-size:23px; margin:34px 0 12px; letter-spacing:-0.015em}
.prose p{margin:0 0 20px}
.prose ul{margin:0 0 20px 22px}
.prose li{margin-bottom:8px}
.prose a{text-decoration:underline; text-underline-offset:2px}

footer.site{border-top:1px solid var(--line); padding:28px 0; color:var(--muted); font-size:13px}
footer.site .wrap{display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px}
footer.site a{color:var(--muted)}

@media(max-width:600px){
  body{font-size:16px}
  .hero h1{font-size:31px} h1.page{font-size:26px} article.post h1{font-size:27px}
  .nav a{padding:6px 7px}
}
</style>
<script>
(function(){
  try{
    var t = localStorage.getItem('theme');
    if(t){ document.documentElement.setAttribute('data-theme', t); }
  }catch(e){}
})();
</script>
</head>
<body>
<header class="site">
  <div class="wrap">
    <a class="brand" href="/">{{ site_name_html }}</a>
    <div class="nav">
      <a href="/"{{ ' class="active"' if nav_active == 'home' else '' }}>Home</a>
      <a href="/topics/"{{ ' class="active"' if nav_active == 'topics' else '' }}>Topics</a>
      <a href="/about/"{{ ' class="active"' if nav_active == 'about' else '' }}>About</a>
      <a href="/feed.xml">RSS</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>
<main>
  <div class="wrap">
    {{ content }}
  </div>
</main>
<footer class="site">
  <div class="wrap">
    <span>© {{ year }} {{ author }}</span>
    <span>Built automatically · <a href="/feed.xml">RSS</a></span>
  </div>
</footer>
<script>
(function(){
  var btn = document.getElementById('themeToggle');
  if(!btn) return;
  btn.addEventListener('click', function(){
    var cur = document.documentElement.getAttribute('data-theme');
    if(!cur){
      cur = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    var next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try{ localStorage.setItem('theme', next); }catch(e){}
  });
})();
</script>
</body>
</html>
