<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page_title }}</title>
<meta name="description" content="{{ page_description }}">
<link rel="alternate" type="application/rss+xml" title="{{ site_name }}" href="/feed.xml">
<style>
:root{
  --bg:#fbfbf9; --surface:#ffffff; --ink:#16161a; --muted:#6b6b72;
  --line:#e6e6e0; --accent:#1f5c4d; --accent-soft:#eaf2ef;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  line-height:1.65; font-size:17px; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:680px; margin:0 auto; padding:0 24px}
header.site{border-bottom:1px solid var(--line); padding:28px 0; margin-bottom:8px}
header.site .wrap{display:flex; align-items:baseline; justify-content:space-between; gap:16px}
.brand{font-weight:600; font-size:18px; letter-spacing:-0.01em; color:var(--ink); text-decoration:none}
.brand span{color:var(--accent)}
nav a{color:var(--muted); text-decoration:none; font-size:14px; margin-left:18px}
nav a:hover{color:var(--ink)}
.eyebrow{font-family:"SFMono-Regular",ui-monospace,Menlo,monospace; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--accent); margin-bottom:10px}
main{padding:32px 0 64px}
h1.page{font-size:30px; line-height:1.2; letter-spacing:-0.02em; margin-bottom:6px}
.lede{color:var(--muted); font-size:18px; margin-bottom:40px}
.post-list{list-style:none}
.post-item{padding:24px 0; border-bottom:1px solid var(--line)}
.post-item:last-child{border-bottom:none}
.post-item .date{font-family:"SFMono-Regular",ui-monospace,Menlo,monospace; font-size:12px; color:var(--muted); letter-spacing:0.04em}
.post-item h2{font-size:21px; line-height:1.3; letter-spacing:-0.01em; margin:6px 0 6px}
.post-item h2 a{color:var(--ink); text-decoration:none}
.post-item h2 a:hover{color:var(--accent)}
.post-item p{color:var(--muted); font-size:15.5px}
.tag{display:inline-block; font-family:ui-monospace,Menlo,monospace; font-size:11px; color:var(--accent); background:var(--accent-soft); padding:2px 8px; border-radius:4px; margin-top:10px}
article.post{}
article.post .meta{font-family:"SFMono-Regular",ui-monospace,Menlo,monospace; font-size:12.5px; color:var(--muted); margin-bottom:14px; letter-spacing:0.03em}
article.post h1{font-size:32px; line-height:1.18; letter-spacing:-0.02em; margin-bottom:24px}
article.post h2{font-size:22px; margin:34px 0 12px; letter-spacing:-0.01em}
article.post h3{font-size:18px; margin:28px 0 10px}
article.post p{margin:0 0 20px}
article.post a{color:var(--accent); text-decoration:underline; text-underline-offset:2px}
article.post ul,article.post ol{margin:0 0 20px 22px}
article.post li{margin-bottom:8px}
article.post blockquote{border-left:3px solid var(--accent); padding-left:18px; color:var(--muted); margin:0 0 20px; font-style:italic}
article.post code{font-family:ui-monospace,Menlo,monospace; font-size:0.9em; background:#f2f2ec; padding:1px 5px; border-radius:4px}
article.post pre{background:#16161a; color:#f4f4f0; padding:18px; border-radius:8px; overflow-x:auto; margin:0 0 20px}
article.post pre code{background:none; color:inherit; padding:0}
.back{display:inline-block; margin-bottom:28px; color:var(--muted); text-decoration:none; font-size:14px}
.back:hover{color:var(--accent)}
footer.site{border-top:1px solid var(--line); padding:28px 0; color:var(--muted); font-size:13px}
footer.site .wrap{display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px}
footer.site a{color:var(--muted)}
@media(max-width:600px){ body{font-size:16px} h1.page{font-size:25px} article.post h1{font-size:26px} }
</style>
</head>
<body>
<header class="site">
  <div class="wrap">
    <a class="brand" href="/">{{ site_name_html }}</a>
    <nav><a href="/">Home</a><a href="/feed.xml">RSS</a></nav>
  </div>
</header>
<main>
  <div class="wrap">
    {{ content }}
  </div>
</main>
<footer class="site">
  <div class="wrap">
    <span>© {{ year }} {{ author }}</span>
    <span>Built automatically · {{ site_name }}</span>
  </div>
</footer>
</body>
</html>
