<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page_title }}</title>
<meta name="description" content="{{ page_description }}">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<link rel="canonical" href="{{ site_url }}{{ canonical_path }}">
<link rel="alternate" type="application/rss+xml" title="{{ site_name }}" href="/feed.xml">
<meta property="og:type" content="{{ og_type }}">
<meta property="og:title" content="{{ page_title }}">
<meta property="og:description" content="{{ page_description }}">
<meta property="og:site_name" content="{{ site_name }}">
<meta property="og:url" content="{{ site_url }}{{ canonical_path }}">
<meta name="twitter:card" content="summary">
<style>
:root{
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua","Hoefler Text",Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
  --bg:#fcfbf7; --surface:#ffffff; --ink:#1b1b1d; --muted:#6c6c70;
  --line:#e7e4d9; --hair:#efece3; --accent:#2f5d50; --accent-soft:#edf3f0; --accent-ink:#234a40;
  --code-bg:#f1efe7; --pre-bg:#1b1b1d; --pre-ink:#f5f3ec; --shadow:rgba(27,27,29,.07);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#121211; --surface:#191916; --ink:#ecebe5; --muted:#9b9a92;
    --line:#2a2a26; --hair:#222220; --accent:#7fc9b4; --accent-soft:#172420; --accent-ink:#9eddca;
    --code-bg:#1d1d1a; --pre-bg:#0d0d0c; --pre-ink:#e9e8e1; --shadow:rgba(0,0,0,.4);
  }
}
html[data-theme="light"]{
  --bg:#fcfbf7; --surface:#ffffff; --ink:#1b1b1d; --muted:#6c6c70;
  --line:#e7e4d9; --hair:#efece3; --accent:#2f5d50; --accent-soft:#edf3f0; --accent-ink:#234a40;
  --code-bg:#f1efe7; --pre-bg:#1b1b1d; --pre-ink:#f5f3ec; --shadow:rgba(27,27,29,.07);
}
html[data-theme="dark"]{
  --bg:#121211; --surface:#191916; --ink:#ecebe5; --muted:#9b9a92;
  --line:#2a2a26; --hair:#222220; --accent:#7fc9b4; --accent-soft:#172420; --accent-ink:#9eddca;
  --code-bg:#1d1d1a; --pre-bg:#0d0d0c; --pre-ink:#e9e8e1; --shadow:rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--ink); font-family:var(--sans);
  line-height:1.7; font-size:17px; -webkit-font-smoothing:antialiased;
  transition:background .2s ease, color .2s ease;
}
.wrap{max-width:720px; margin:0 auto; padding:0 26px}
.wrap.wide{max-width:960px}
a{color:var(--accent)}

/* Header */
header.site{position:sticky; top:0; z-index:20; background:color-mix(in srgb, var(--bg) 86%, transparent);
  backdrop-filter:saturate(180%) blur(10px); border-bottom:1px solid var(--hair)}
header.site .inner{display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:18px 26px; max-width:960px; margin:0 auto}
.brand{font-family:var(--serif); font-weight:600; font-size:21px; letter-spacing:-0.01em;
  color:var(--ink); text-decoration:none; white-space:nowrap}
.brand span{color:var(--accent); font-style:italic}
.nav{display:flex; align-items:center; gap:2px}
.nav a{font-family:var(--sans); color:var(--muted); text-decoration:none; font-size:14px;
  padding:7px 11px; border-radius:7px; transition:color .15s, background .15s}
.nav a:hover{color:var(--ink)}
.nav a.active{color:var(--accent-ink); background:var(--accent-soft)}
.theme-toggle{background:none; border:1px solid var(--line); color:var(--muted); width:34px; height:34px;
  border-radius:8px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
  margin-left:8px; transition:color .15s, border-color .15s}
.theme-toggle:hover{color:var(--ink); border-color:var(--accent)}
.theme-toggle svg{width:16px; height:16px}

main{padding:60px 0 80px; min-height:62vh}
.eyebrow{font-family:var(--mono); font-size:11.5px; letter-spacing:0.14em; text-transform:uppercase;
  color:var(--accent); margin-bottom:16px}

/* Hero */
.hero{padding:6px 0 44px; border-bottom:1px solid var(--line); margin-bottom:48px;
  display:flex; align-items:center; gap:40px}
.hero-text{flex:1 1 auto; min-width:0}
.hero-anim{flex:0 0 auto; width:300px; height:300px; opacity:.9}
.hero h1{font-family:var(--serif); font-weight:600; font-size:44px; line-height:1.08;
  letter-spacing:-0.015em; margin-bottom:18px}
.hero .lede{color:var(--muted); font-size:19px; line-height:1.6; max-width:44ch}
.epigraph{margin:28px 0 0; padding-left:20px; border-left:2px solid var(--accent); max-width:48ch}
.epigraph blockquote{font-family:var(--serif); font-style:italic; font-size:18px; line-height:1.55; color:var(--ink)}
.epigraph figcaption{font-family:var(--mono); font-size:12px; letter-spacing:0.04em; color:var(--muted); margin-top:10px}

h1.page{font-family:var(--serif); font-weight:600; font-size:34px; line-height:1.12;
  letter-spacing:-0.01em; margin-bottom:10px}
.lede{color:var(--muted); font-size:18px; margin-bottom:40px}

/* Post list */
.post-list{list-style:none}
.post-item{padding:28px 0; border-bottom:1px solid var(--hair)}
.post-item:last-child{border-bottom:none}
.post-item .date{font-family:var(--mono); font-size:12px; color:var(--muted); letter-spacing:0.05em}
.post-item h2{font-family:var(--serif); font-weight:600; font-size:24px; line-height:1.25;
  letter-spacing:-0.01em; margin:8px 0 8px}
.post-item h2 a{color:var(--ink); text-decoration:none}
.post-item h2 a:hover{color:var(--accent)}
.post-item p{color:var(--muted); font-size:16px}
.tag{display:inline-block; font-family:var(--mono); font-size:11px; color:var(--accent-ink);
  background:var(--accent-soft); padding:4px 10px; border-radius:100px; margin-top:14px;
  text-decoration:none; letter-spacing:0.02em}
a.tag:hover{filter:brightness(.97)}

/* Topics grid */
.topic-grid{list-style:none; display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:16px; margin-top:10px}
.topic-card{border:1px solid var(--line); border-radius:12px; background:var(--surface);
  transition:border-color .15s, transform .15s; box-shadow:0 1px 2px var(--shadow)}
.topic-card:hover{border-color:var(--accent); transform:translateY(-2px)}
.topic-card a{display:block; padding:20px; text-decoration:none}
.topic-card .topic-name{font-family:var(--serif); color:var(--ink); font-weight:600; font-size:18px}
.topic-card:hover .topic-name{color:var(--accent)}
.topic-card .desc{display:block; color:var(--muted); font-size:13.5px; line-height:1.5; margin-top:7px}
.topic-card .count{display:block; font-family:var(--mono); color:var(--accent); font-size:11.5px;
  letter-spacing:0.04em; margin-top:12px}

/* Page header with a logo on the right (Projects) */
.page-head{display:flex; align-items:flex-start; justify-content:space-between; gap:20px; margin-bottom:8px}
.page-head .lede{margin-bottom:0}
.page-logo{flex:0 0 auto; width:120px; height:120px; border-radius:20px; margin-top:4px}

/* Share / copy-link button */
.share-btn{display:inline-flex; align-items:center; gap:7px; font-family:var(--sans); font-size:13px;
  color:var(--muted); background:none; border:1px solid var(--line); border-radius:8px;
  padding:7px 12px; cursor:pointer; transition:color .15s, border-color .15s}
.share-btn:hover{color:var(--accent); border-color:var(--accent)}
.share-btn svg{width:15px; height:15px}
.share-btn.icon-only{padding:8px; border-radius:8px}
.share-btn.is-copied{color:var(--accent); border-color:var(--accent)}

/* Projects */
.project-grid{list-style:none; display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:16px; margin-top:10px}
.project-card{position:relative; border:1px solid var(--line); border-radius:12px; background:var(--surface);
  transition:border-color .15s, transform .15s; box-shadow:0 1px 2px var(--shadow)}
.project-card:hover{border-color:var(--accent); transform:translateY(-2px)}
.project-card .card-link{display:block; padding:20px 56px 20px 20px; text-decoration:none}
.project-body{display:flex; flex-direction:column}
.project-name{font-family:var(--serif); font-weight:600; font-size:18px; color:var(--ink)}
.project-arrow{color:var(--muted); font-size:14px}
.project-card:hover .project-arrow{color:var(--accent)}
.project-desc{color:var(--muted); font-size:14.5px; line-height:1.5; margin-top:5px}
.project-card .share-btn{position:absolute; top:14px; right:14px; z-index:2}

/* Article */
article.post .meta{font-family:var(--mono); font-size:12.5px; color:var(--muted); margin-bottom:16px; letter-spacing:0.04em}
.takeaway{background:var(--accent-soft); border:1px solid var(--line); border-left:3px solid var(--accent);
  border-radius:10px; padding:16px 20px; margin:0 0 30px}
.takeaway-label{display:block; font-family:var(--mono); font-size:11px; letter-spacing:0.1em;
  text-transform:uppercase; color:var(--accent-ink); margin-bottom:6px}
.takeaway p{margin:0; font-family:var(--serif); font-size:17.5px; line-height:1.5; color:var(--ink)}
article.post h1{font-family:var(--serif); font-weight:600; font-size:38px; line-height:1.12;
  letter-spacing:-0.015em; margin-bottom:26px}
article.post h2{font-family:var(--serif); font-weight:600; font-size:25px; margin:40px 0 14px; letter-spacing:-0.01em}
article.post h3{font-family:var(--serif); font-weight:600; font-size:20px; margin:30px 0 10px}
article.post p{margin:0 0 22px}
article.post a{color:var(--accent); text-decoration:underline; text-underline-offset:2px; text-decoration-thickness:.5px}
article.post ul,article.post ol{margin:0 0 22px 22px}
article.post li{margin-bottom:9px}
article.post blockquote{border-left:2px solid var(--accent); padding:2px 0 2px 20px; color:var(--muted);
  margin:0 0 22px; font-family:var(--serif); font-style:italic; font-size:19px}
article.post code{font-family:var(--mono); font-size:0.88em; background:var(--code-bg); padding:1px 5px; border-radius:4px}
article.post pre{background:var(--pre-bg); color:var(--pre-ink); padding:18px; border-radius:8px; overflow-x:auto; margin:0 0 22px}
article.post pre code{background:none; color:inherit; padding:0}
article.post pre.mermaid{background:transparent; color:inherit; padding:0; margin:26px 0; text-align:center; overflow:visible}
.tags{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px}
.tags .tag{margin-top:0}
article.post table{width:100%; border-collapse:collapse; margin:0 0 22px; font-size:15px}
article.post th,article.post td{border:1px solid var(--line); padding:8px 12px; text-align:left}
article.post th{background:var(--accent-soft); font-weight:600}
article.post hr{border:none; border-top:1px solid var(--line); margin:40px 0}
.post-footer{margin-top:48px; padding-top:26px; border-top:1px solid var(--line); color:var(--muted);
  font-size:14px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap}

.back{display:inline-block; margin-bottom:30px; color:var(--muted); text-decoration:none; font-size:14px}
.back:hover{color:var(--accent)}

/* Prose pages (About) */
.prose{font-size:17px}
.prose h2{font-family:var(--serif); font-weight:600; font-size:23px; margin:36px 0 14px; letter-spacing:-0.01em}
.prose p{margin:0 0 22px}
.prose ul{margin:0 0 22px 22px}
.prose li{margin-bottom:9px}
.prose a{text-decoration:underline; text-underline-offset:2px}
.portrait{float:right; width:184px; height:auto; border-radius:8px; margin:2px 0 22px 30px;
  border:1px solid var(--line); box-shadow:0 8px 26px var(--shadow)}

footer.site{border-top:1px solid var(--hair); padding:30px 0; color:var(--muted); font-size:13px}
footer.site .inner{display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; max-width:960px; margin:0 auto; padding:0 26px}
footer.site a{color:var(--muted)}
.copyright{display:inline-flex; align-items:center; gap:8px}
.footer-right{display:inline-flex; align-items:center; gap:14px}
.social-row{display:inline-flex; align-items:center; gap:14px}
.social-row a{color:var(--muted); display:inline-flex; transition:color .15s}
.social-row a:hover{color:var(--accent)}
.social-row svg{width:19px; height:19px; fill:currentColor}
.hero-social{margin-top:26px; gap:18px}
.hero-social svg{width:22px; height:22px}
.us-flag{width:22px; height:15px; border-radius:2px; border:1px solid var(--line); vertical-align:middle; flex:0 0 auto}

@media(max-width:760px){
  .hero{gap:0}
  .hero-anim{display:none}
}
@media(max-width:600px){
  body{font-size:16px}
  .hero h1{font-size:34px} h1.page{font-size:28px} article.post h1{font-size:29px}
  .nav a{padding:7px 8px}
  .portrait{float:none; display:block; margin:0 auto 24px; width:200px}
  .page-head{flex-direction:column-reverse; align-items:flex-start; gap:14px}
  .page-logo{width:88px; height:88px}
}
</style>
<script>
(function(){try{var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>
</head>
<body>
<header class="site">
  <div class="inner">
    <a class="brand" href="/">{{ site_name_html }}</a>
    <div class="nav">
      <a href="/"{{ ' class="active"' if nav_active == 'home' else '' }}>Home</a>
      <a href="/topics/"{{ ' class="active"' if nav_active == 'topics' else '' }}>Topics</a>
      <a href="/projects/"{{ ' class="active"' if nav_active == 'projects' else '' }}>Projects</a>
      <a href="/about/"{{ ' class="active"' if nav_active == 'about' else '' }}>About</a>
      <a href="/feed.xml">RSS</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>
<main>
  <div class="wrap{{ ' wide' if wide else '' }}">
    {{ content }}
  </div>
</main>
<footer class="site">
  <div class="inner">
    <span class="copyright"><img class="us-flag" src="/assets/us-flag.svg" alt="United States" width="22" height="15">© {{ year }} {{ author }} · All rights reserved</span>
    <span class="footer-right">{{ social_html }}<a href="/feed.xml">RSS</a></span>
  </div>
</footer>
<script>
(function(){
  var btn=document.getElementById('themeToggle'); if(!btn) return;
  btn.addEventListener('click',function(){
    var cur=document.documentElement.getAttribute('data-theme');
    if(!cur) cur=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
    var next=cur==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',next);
    try{localStorage.setItem('theme',next);}catch(e){}
  });
})();
// Share / copy-link buttons
(function(){
  document.querySelectorAll('[data-share-url]').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.preventDefault(); e.stopPropagation();
      var url = btn.getAttribute('data-share-url');
      if(navigator.share){ navigator.share({url:url}).catch(function(){}); return; }
      var done = function(){
        btn.classList.add('is-copied');
        var s = btn.querySelector('span'); var old = s && s.textContent;
        if(s) s.textContent = 'Copied!';
        setTimeout(function(){ btn.classList.remove('is-copied'); if(s) s.textContent = old; }, 1500);
      };
      if(navigator.clipboard){ navigator.clipboard.writeText(url).then(done, done); }
    });
  });
})();
</script>
{% if needs_mermaid %}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  var t = document.documentElement.getAttribute('data-theme')
          || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  mermaid.initialize({ startOnLoad: true, securityLevel: 'strict',
    theme: t === 'dark' ? 'dark' : 'neutral', fontFamily: 'inherit' });
</script>
{% endif %}
</body>
</html>
