name: Daily draft pipeline

# Runs the pipeline on a schedule to draft new articles.
# New posts are saved as DRAFTS (published: false) and committed to the repo.
# They stay hidden on the site until you review and approve them.

on:
  schedule:
    - cron: '0 12 * * 1-5'   # weekdays at 12:00 UTC (~8am ET)
  workflow_dispatch:           # also lets you run it manually anytime

permissions:
  contents: write
  issues: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py

      - name: Commit new drafts
        id: commit
        run: |
          git config user.name "Draft Bot"
          git config user.email "bot@users.noreply.github.com"
          git add posts/
          if git diff --cached --quiet; then
            echo "No new drafts"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Daily drafts $(date +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open review issue
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/open_review_issue.py
