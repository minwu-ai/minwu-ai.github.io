name: Daily draft pipeline

# Runs the pipeline on a schedule to draft new articles.
# New posts are saved as DRAFTS (published: false) and committed to the repo.
# They stay hidden on the site until you review and approve them.

on:
  schedule:
    # GitHub cron is best-effort and often drops a slot, so we try several off-peak
    # times each weekday. A same-day guard (below) ensures only the FIRST one that
    # actually fires produces drafts — the rest no-op, so no duplicate posts.
    - cron: '17 12 * * 1-5'  # ~08:17 ET
    - cron: '41 13 * * 1-5'  # backup ~09:41 ET
    - cron: '29 15 * * 1-5'  # backup ~11:29 ET
  workflow_dispatch:           # also lets you run it manually anytime

permissions:
  contents: write
  issues: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the same-day guard's git log works

      - name: Skip if already drafted today (scheduled runs only)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && \
             git log --oneline --grep="Daily drafts $(date -u +%Y-%m-%d)" | grep -q .; then
            echo "Already drafted today — this backup slot will no-op."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip != 'true'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pip install anthropic

      - name: Run pipeline
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py

      - name: Commit new drafts
        id: commit
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "Draft Bot"
          git config user.email "bot@users.noreply.github.com"
          git add posts/
          if git diff --cached --quiet; then
            echo "No new drafts"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Daily drafts $(date +%Y-%m-%d)"
            # Resilient push: rebase onto any concurrent changes, retry a few times.
            pushed=false
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && { pushed=true; break; }
              echo "push attempt $i failed; retrying..."; sleep 5
            done
            if [ "$pushed" = true ]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::could not push drafts after retries"; exit 1
            fi
          fi

      - name: Open review issue
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/open_review_issue.py

      - name: Notify when no drafts were produced
        if: steps.commit.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_EMPTY: "1"
        run: python .github/scripts/open_review_issue.py
